<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexStore — Order Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <style>
        :root {
            --brand-dark:   #0d0f14;
            --brand-mid:    #161b27;
            --brand-card:   #1c2233;
            --brand-border: #2a3350;
            --brand-accent: #e8f04a;
            --brand-accent2:#4af0d4;
            --text-primary: #eef0f6;
            --text-muted:   #7a839e;
            --radius-card:  16px;
            --transition:   0.22s ease;
            --bottom-nav-h: 64px;
        }

        body {
            background-color: var(--brand-dark);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            padding-bottom: 0;
        }
        @media (max-width: 767px) {
            body { padding-bottom: var(--bottom-nav-h); }
        }

        .nex-navbar {
            background: rgba(13,15,20,0.85);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--brand-border);
            position: sticky; top: 0; z-index: 1030;
            padding: 0.9rem 0;
        }
        /* Hide desktop navbar on mobile */
        @media (max-width: 767px) { .nex-navbar { display: none; } }
        .nex-logo {
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.55rem;
            color: var(--text-primary); text-decoration: none;
        }
        .nex-logo span { color: var(--brand-accent); }
        .cart-pill {
            background: var(--brand-card); border: 1px solid var(--brand-border);
            border-radius: 50px; padding: 0.35rem 0.9rem; color: var(--text-primary);
            text-decoration: none; font-size: 0.88rem; display: inline-flex; align-items: center; gap: 6px;
        }

        .detail-container { max-width: 800px; margin: 2.5rem auto; padding: 0 1rem; }

        .back-link {
            color: var(--brand-accent2); text-decoration: none; font-size: 0.9rem;
            display: inline-flex; align-items: center; gap: 6px; margin-bottom: 1.5rem;
        }

        .receipt-card {
            background: var(--brand-card); border: 1px solid var(--brand-border);
            border-radius: var(--radius-card); padding: 2rem;
        }

        .receipt-header {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 1rem; border-bottom: 1px solid var(--brand-border);
            padding-bottom: 1.5rem; margin-bottom: 1.5rem;
        }
        .receipt-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; margin: 0; }
        .receipt-date { color: var(--text-muted); font-size: 0.88rem; margin-top: 4px; }

        .status-badge {
            font-size: 0.75rem; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase;
            padding: 4px 12px; border-radius: 50px; background: rgba(74,240,212,0.1); color: var(--brand-accent2);
            border: 1px solid rgba(74,240,212,0.25);
        }

        .item-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem 0; border-bottom: 1px solid rgba(42,51,80,0.4);
        }
        .item-meta { display: flex; align-items: center; gap: 1rem; }
        .item-img {
            width: 50px; height: 40px; border-radius: 6px; background: var(--brand-mid);
            border: 1px solid var(--brand-border); object-fit: cover;
        }
        .item-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; }
        .item-qty { font-size: 0.82rem; color: var(--text-muted); margin-top: 2px; }

        .pricing-box {
            margin-top: 1.5rem; padding-top: 1rem; max-width: 320px; margin-left: auto;
        }
        .pricing-row { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 0.5rem; color: var(--text-muted); }
        .pricing-row.total {
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem;
            color: var(--brand-accent); border-top: 1px solid var(--brand-border); padding-top: 0.75rem; margin-top: 0.5rem;
        }

        /* ── Admin: status change panel ── */
        .admin-status-panel {
            margin-top: 1.75rem; padding-top: 1.5rem;
            border-top: 1px solid var(--brand-border);
            display: flex; align-items: flex-end; gap: 0.75rem; flex-wrap: wrap;
        }
        .admin-status-panel .field-group { flex: 1; min-width: 180px; }
        .admin-status-panel label {
            display: block; font-size: 0.72rem; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px;
        }
        .admin-status-select {
            width: 100%; background: var(--brand-mid); border: 1px solid var(--brand-border);
            color: var(--text-primary); border-radius: 8px; padding: 9px 12px;
            font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
        }
        .admin-status-select:focus { outline: none; border-color: var(--brand-accent2); }
        .btn-save-status {
            background: var(--brand-accent2); border: none; color: var(--brand-dark);
            border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.88rem;
            padding: 10px 22px; cursor: pointer;
            transition: background var(--transition), transform 0.1s;
            display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
        }
        .btn-save-status:hover { background: #3dd8bc; }
        .btn-save-status:active { transform: scale(0.97); }
        .admin-status-note {
            flex: 1 1 100%; font-size: 0.78rem; color: var(--text-muted); margin-top: 0.25rem;
        }
        @media (max-width: 767px) {
            .admin-status-panel { flex-direction: column; align-items: stretch; }
            .btn-save-status { width: 100%; justify-content: center; }
        }

        /* Mobile responsive fixes */
        @media (max-width: 767px) {
            .detail-container { margin: 1rem auto; padding: 0 0.75rem; }
            .receipt-card { padding: 1.25rem 1rem; }
            .receipt-title { font-size: 1.1rem; word-break: break-all; }
            .receipt-header { padding-bottom: 1rem; margin-bottom: 1rem; gap: 0.5rem; }
            .item-row { flex-direction: column; align-items: flex-start; gap: 0.5rem; padding: 0.85rem 0; }
            .item-row > .item-name:last-child {
                align-self: flex-end;
                font-size: 1rem;
                color: var(--brand-accent);
            }
            .item-meta { gap: 0.75rem; width: 100%; }
            .item-img { width: 44px; height: 36px; }
            .item-name { font-size: 0.88rem; }
            .item-qty { font-size: 0.78rem; }
            .pricing-box { max-width: 100%; margin-left: 0; padding-top: 0.75rem; }
            .pricing-row.total { font-size: 1.1rem; }
            /* Mobile topbar: show back button */
            .mobile-topbar-actions { gap: 8px; }
        }
        /* ══════════════════════════════════════
           MOBILE TOP STRIP (logo + icon buttons)
        ══════════════════════════════════════ */
        .mobile-topbar {
            display: none;
            position: sticky;
            top: 0;
            z-index: 1030;
            background: rgba(13,15,20,0.95);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--brand-border);
            padding: 0.75rem 1rem;
            align-items: center;
            justify-content: space-between;
        }
        @media (max-width: 767px) { .mobile-topbar { display: flex; } }

        .mobile-topbar .nex-logo { font-size: 1.3rem; }

        .mobile-topbar-actions { display: flex; align-items: center; gap: 10px; }

        .mob-icon-btn {
            background: var(--brand-card);
            border: 1px solid var(--brand-border);
            border-radius: 10px;
            color: var(--text-primary);
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.05rem;
            text-decoration: none;
            position: relative;
            cursor: pointer;
            transition: border-color var(--transition), color var(--transition);
        }
        .mob-icon-btn:hover { border-color: var(--brand-accent); color: var(--brand-accent); }

        .mob-cart-badge {
            position: absolute;
            top: -5px; right: -5px;
            background: var(--brand-accent);
            color: var(--brand-dark);
            font-weight: 700;
            font-size: 0.62rem;
            border-radius: 50px;
            padding: 1px 5px;
            line-height: 1.4;
        }

        /* ══════════════════════════════════════
           MOBILE BOTTOM NAVIGATION BAR
        ══════════════════════════════════════ */
        .mobile-bottom-nav {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 1040;
            height: var(--bottom-nav-h);
            background: rgba(13,15,20,0.97);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--brand-border);
        }
        @media (max-width: 767px) { .mobile-bottom-nav { display: flex; } }

        .mob-nav-inner {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .mob-nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            transition: color var(--transition);
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }
        .mob-nav-item i { font-size: 1.25rem; line-height: 1; }
        .mob-nav-item:hover,
        .mob-nav-item.active { color: var(--brand-accent); }
        .mob-nav-item.active i { color: var(--brand-accent); }

        .mob-nav-dot {
            position: absolute;
            top: 8px; right: calc(50% - 16px);
            width: 6px; height: 6px;
            background: var(--brand-accent);
            border-radius: 50%;
        }

        .mob-nav-badge {
            position: absolute;
            top: 6px;
            right: calc(50% - 20px);
            background: var(--brand-accent);
            color: var(--brand-dark);
            font-weight: 700;
            font-size: 0.6rem;
            border-radius: 50px;
            padding: 1px 5px;
            line-height: 1.4;
        }

        /* Separator line between nav items */
        .mob-nav-item + .mob-nav-item {
            border-left: 1px solid rgba(42,51,80,0.5);
        }

        /* Sign out form inside bottom nav */
        .mob-nav-form {
            flex: 1;
            display: flex;
        }
        .mob-nav-form button {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            color: var(--text-muted);
            background: none;
            border: none;
            border-left: 1px solid rgba(42,51,80,0.5);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: color var(--transition);
        }
        .mob-nav-form button i { font-size: 1.25rem; }
        .mob-nav-form button:hover { color: var(--brand-danger); }
    </style>
</head>
<body>

<nav class="nex-navbar">
    <div class="container d-flex align-items-center justify-content-between">
        <a href="/" class="nex-logo">Nex<span>Store</span></a>
        <a th:href="${isAdminView != null && isAdminView} ? @{/admin/orders} : @{/orders}" class="cart-pill">
            <i class="bi bi-arrow-left"></i> Back to <span th:text="${isAdminView != null && isAdminView} ? 'Orders' : 'History'"></span>
        </a>
    </div>
</nav>

<!-- Mobile top strip -->
<div class="mobile-topbar">
    <a href="/" class="nex-logo">Nex<span>Store</span></a>
    <div class="mobile-topbar-actions">
        <a th:href="${isAdminView != null && isAdminView} ? @{/admin/orders} : @{/orders}" class="mob-icon-btn" title="Back to Orders">
            <i class="bi bi-chevron-left"></i>
        </a>
    </div>
</div>

<div class="detail-container">

    <div th:if="${successMessage}" class="nex-alert success" style="border-radius:10px;font-size:0.88rem;padding:10px 16px;display:flex;align-items:center;gap:8px;margin-bottom:1rem;background:rgba(74,240,212,0.08);border:1px solid rgba(74,240,212,0.25);color:var(--brand-accent2);">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="nex-alert error" style="border-radius:10px;font-size:0.88rem;padding:10px 16px;display:flex;align-items:center;gap:8px;margin-bottom:1rem;background:rgba(255,76,106,0.08);border:1px solid rgba(255,76,106,0.3);color:var(--brand-danger);">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <div class="receipt-card">
        <div class="receipt-header">
            <div>
                <h2 class="receipt-title" th:text="${order.orderNumber}">ORD-XXXXXX</h2>
                <div class="receipt-date" th:text="'Placed on: ' + ${#temporals.format(order.orderDate, 'dd MMM yyyy, HH:mm')}">18 Jun 2026</div>
            </div>
            <span class="status-badge" th:text="${order.status}">PENDING</span>
        </div>

        <div th:each="item : ${order.orderItems}" class="item-row">
            <div class="item-meta">
                <img class="item-img" th:if="${item.product != null && item.product.imageUrl != null}" th:src="${item.product.imageUrl}" />
                <div>
                    <div class="item-name" th:text="${item.product != null ? item.product.name : 'Unknown Product'}">Product Item</div>
                    <div class="item-qty" th:text="'Quantity: ' + ${item.quantity} + ' × $' + ${#numbers.formatDecimal(item.price, 1, 2)}">Quantity: 1</div>
                </div>
            </div>
            <div class="item-name" th:text="'$' + ${#numbers.formatDecimal(item.price * item.quantity, 1, 2)}">$0.00</div>
        </div>

        <div class="pricing-box">
            <div class="pricing-row total">
                <span>Amount Paid</span>
                <span th:text="'$' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}">$0.00</span>
            </div>
        </div>

        <!-- Admin-only: change order status. Stock is only adjusted once an admin
             moves an order from PENDING to PROCESSING via this control. -->
        <form th:if="${isAdminView != null && isAdminView}"
              th:action="@{/admin/orders/{id}/status(id=${order.id})}"
              method="post" class="admin-status-panel">
            <div class="field-group">
                <label for="statusSelect">Order Status</label>
                <select id="statusSelect" name="status" class="admin-status-select">
                    <option th:each="s : ${allStatuses}"
                            th:value="${s}"
                            th:text="${s}"
                            th:selected="${s == order.status}"></option>
                </select>
            </div>
            <button type="submit" class="btn-save-status">
                <i class="bi bi-check-lg"></i> Save Status
            </button>
            <div class="admin-status-note" th:if="${order.status == 'PENDING'}">
                <i class="bi bi-info-circle"></i>
                Moving this order to <strong>PROCESSING</strong> confirms it and deducts stock for each item.
            </div>
        </form>
    </div>
</div>

<!-- Mobile bottom nav -->
<nav class="mobile-bottom-nav">
    <div class="mob-nav-inner">
        <a href="/" class="mob-nav-item">
            <i class="bi bi-house-fill"></i>
            <span>Home</span>
        </a>
        <a th:href="${isAdminView != null && isAdminView} ? @{/admin/orders} : @{/orders}" class="mob-nav-item active">
            <i class="bi bi-bag-check"></i>
            <span th:text="${isAdminView != null && isAdminView} ? 'Orders' : 'History'">Orders</span>
        </a>
        <a th:if="${isAdminView != null && isAdminView}" href="/admin/products" class="mob-nav-item">
            <i class="bi bi-boxes"></i>
            <span>Inventory</span>
        </a>
    </div>
</nav>

</body>
</html>
