# ═ 🗄️ RELATIONAL DATABASE CONNECTION POOL (ENVIRONMENT INJECTED) ═
# Defaults point to a SAFE, LOCAL H2 database. Azure will override these with real secrets.
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/nexstore_dev}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# ═ ⚙️ HIBERNATE ORM PERFORMANCE & SCHEMAS ═
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ═ 📦 AZURE BLOB STORAGE CONFIGURATION ═
# Adding a colon allows a default fallback if the environment variable is absent
spring.cloud.azure.storage.blob.connection-string=${AZURE_STORAGE_CONNECTION_STRING:}
azure.storage.container-name=${AZURE_STORAGE_CONTAINER_NAME:product-images}

# ═ 🔌 HIKARICP PLATFORM OPTIMIZATIONS ═
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# ═ ❌ DEACTIVATE VOLATILE IN-MEMORY CONSOLES ═
# Defaults to true locally so you can debug, but Azure will inject 'false'
spring.h2.console.enabled=${H2_CONSOLE:true}